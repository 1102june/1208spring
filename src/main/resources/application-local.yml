# 로컬 개발용 설정 파일
# ⚠️ 이 파일은 .gitignore에 추가되어 Git에 커밋되지 않습니다.
# ⚠️ 보안 주의: 이 파일에도 API 키를 하드코딩하지 마세요. 환경 변수를 사용하세요.
# 
# 로컬 개발 시 API 키 설정 방법:
#   1. 환경 변수 설정 (권장):
#      - Windows: set GEMINI_API_KEY=your_api_key_here
#      - Linux/Mac: export GEMINI_API_KEY=your_api_key_here
#      - IDE 실행 설정에서 환경 변수 추가
#   2. 이 파일에 직접 설정 (비권장, .gitignore 확인 필수):
#      key: your_api_key_here

# Gemini API 설정 (로컬 개발용)
# ⚠️ 주의: 이 파일은 .gitignore에 포함되어 Git에 커밋되지 않지만, 
# 보안을 위해 환경 변수 사용을 권장합니다.
# 환경 변수가 설정되어 있으면 환경 변수를 우선 사용합니다.
gemini:
  api:
    key: ${GEMINI_API_KEY:AIzaSyCUchqbpTpMMsTno_PiweocZJxrqBUTfpY}  # 환경 변수 우선, 없으면 기본값 사용 (임시)

