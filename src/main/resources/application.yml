    url: jdbc:mariadb://wiseyoung:3306/wise_young?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}  # 환경 변수 사용, 기본값: root
